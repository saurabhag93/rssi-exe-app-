name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install libraries
      run: |
        pip install pyinstaller customtkinter pandas numpy joblib lightgbm

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --add-data "base_lgb.pkl;." your_script.py

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: exe-file
        path: dist/
